<div class="z-overlay" (click)="onClose()">
  <div class="z-modal w-full max-w-md" (click)="$event.stopPropagation()">
    <div class="z-modal-header">
      <div>
        <h2 class="text-lg font-semibold">Promena limita</h2>
        <p class="text-xs text-muted-foreground mt-0.5">Postavite nove limite za {{ account.name }}</p>
      </div>
      <button type="button" class="text-muted-foreground hover:text-foreground text-xl leading-none" (click)="onClose()" aria-label="Close modal">
        <span>&times;</span>
      </button>
    </div>

    <form [formGroup]="limitForm" (ngSubmit)="onSubmit()">
      <div class="z-modal-body space-y-4">
        <div>
          <label class="z-label" for="dailyLimit">Dnevni limit ({{ account.currency }})</label>
          <input
            id="dailyLimit"
            type="number"
            class="z-input"
            formControlName="dailyLimit"
            placeholder="Unesite dnevni limit"
            [class.border-red-500]="limitForm.get('dailyLimit')?.invalid && limitForm.get('dailyLimit')?.touched"
          />
          <p class="z-error" *ngIf="limitForm.get('dailyLimit')?.hasError('required') && limitForm.get('dailyLimit')?.touched">
            Dnevni limit je obavezan.
          </p>
        </div>

        <div>
          <label class="z-label" for="monthlyLimit">Mesečni limit ({{ account.currency }})</label>
          <input
            id="monthlyLimit"
            type="number"
            class="z-input"
            formControlName="monthlyLimit"
            placeholder="Unesite mesečni limit"
            [class.border-red-500]="(limitForm.get('monthlyLimit')?.invalid || limitForm.hasError('invalidLimits')) && limitForm.get('monthlyLimit')?.touched"
          />
          <p class="z-error" *ngIf="limitForm.get('monthlyLimit')?.hasError('required') && limitForm.get('monthlyLimit')?.touched">
            Mesečni limit je obavezan.
          </p>
          <p class="z-error" *ngIf="limitForm.hasError('invalidLimits') && limitForm.get('monthlyLimit')?.touched && !limitForm.get('monthlyLimit')?.hasError('required')">
            Mesečni limit ne sme biti manji od dnevnog.
          </p>
        </div>

        <div>
          <label class="z-label" for="otpCode">
            Verifikacioni kod
            <span *ngIf="isSendingCode" class="text-xs text-muted-foreground ml-2">Slanje koda...</span>
            <button *ngIf="!isSendingCode" type="button" class="text-xs text-primary hover:underline ml-2" (click)="generateOtp()">Pošalji ponovo</button>
          </label>
          <input
            id="otpCode"
            type="text"
            class="z-input"
            formControlName="otpCode"
            placeholder="Unesite 6-cifreni kod sa emaila"
            maxlength="6"
            [class.border-red-500]="limitForm.get('otpCode')?.invalid && limitForm.get('otpCode')?.touched"
          />
          <p class="z-error" *ngIf="limitForm.get('otpCode')?.hasError('required') && limitForm.get('otpCode')?.touched">
            Verifikacioni kod je obavezan.
          </p>
        </div>
      </div>

      <div class="z-modal-footer">
        <button type="button" class="z-btn z-btn-outline" (click)="onClose()" [disabled]="isSubmitting">Odustani</button>
        <button type="submit" class="z-btn z-btn-primary" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Čuvanje...' : 'Sačuvaj izmene' }}
        </button>
      </div>
    </form>
  </div>
</div>
